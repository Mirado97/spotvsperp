# Local development overrides — applied automatically by docker-compose
version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      target: runtime
    volumes:
      - ./src:/app/src:ro
      - ./config:/app/config:ro
    environment:
      APP_ENV: development
      APP_LOGGING__LEVEL: DEBUG
    restart: "no"

  frontend:
    environment:
      WS_BACKEND_URL: http://localhost:8080
    restart: "no"

  nginx:
    profiles: ["nginx"]  # opt-in; dev uses direct ports

  prometheus:
    ports:
      - "9091:9090"
